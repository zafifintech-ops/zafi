<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <title>Zafi</title>

    <!--
      FIX DEL PARPADEO BLANCO:
      Antes de que cargue React, el WebView de iOS pinta el fondo del <html>/<body>.
      Si es blanco, se ve un destello al abrir la app en modo oscuro.
      Este bloque aplica el color correcto ANTES de renderizar nada, leyendo:
      1. El tema guardado en localStorage ("zafi_theme")
      2. Si no hay, el modo oscuro del sistema (prefers-color-scheme)
    -->
    <style>
      /* Fallback por media query — cubre el primer instante antes del script */
      html, body {
        margin: 0;
        background-color: #DCE1E8; /* claro por defecto */
      }
      @media (prefers-color-scheme: dark) {
        html, body { background-color: #0D0F14; }
      }
      /* Clases que el script de abajo puede forzar */
      html.zafi-dark, html.zafi-dark body { background-color: #0D0F14 !important; }
      html.zafi-light, html.zafi-light body { background-color: #DCE1E8 !important; }
      #root { min-height: 100vh; }
    </style>

    <script>
      /* Se ejecuta ANTES de React: decide el color de fondo inicial. */
      (function () {
        try {
          var saved = null;
          try { saved = localStorage.getItem("zafi_theme"); } catch (e) {}
          var sysDark = false;
          try { sysDark = window.matchMedia("(prefers-color-scheme: dark)").matches; } catch (e) {}
          var isDark;
          if (saved === "dark") isDark = true;
          else if (saved === "light") isDark = false;
          else isDark = sysDark; /* "auto" o sin preferencia */
          document.documentElement.classList.add(isDark ? "zafi-dark" : "zafi-light");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!--
      IMPORTANTE: mantén la ruta de tu script tal como la tenías en tu index.html
      original. Esta línea normalmente la pone Vite automáticamente:
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
